<!DOCTYPE html>
<html>
  <head>
    <title>game</title>

    <style>
      body {
        background-image: linear-radiant(midnightblue, skyblue);
        background-size: 100% auto;
        margin: 0;
        padding: 0
      }
      
      #player {
        background-color: red;
        width: 5rem;
        height: 5rem;
        position: absolute;
        top: 5rem;
        left: 5rem;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
      
    <script>
      //hitbox check
      function checkCollision(elA, elB) {
        const rA = elA.getBoundingClientRect();
        const rB = elB.getBoundingClientRect();

        return (
          rA.left < rB.right &&
          rA.right > rB.left &&
          rA.top < rB.bottom &&
          rA.bottom > rB.top
        );
      }

      const box1 = document.getElementById("player");
      const objects = document.getElementById("objects");

      // Only set up collision checking if objects element exists
      if (objects) {
        const box2 = objects.children;

        setInterval(() => {
          for (let obj of box2) {
            if (checkCollision(box1, obj)) {
              alert("Collision detected");
            }
          }
        }, 100);
      }

      //player moves
      const player = document.getElementById("player");

      let x = 0;
      let y = 0;

      window.addEventListener("keydown", (event) => {

      if (event.key === "ArrowUp") {
          y -= 5rem;
      }

      if (event.key === "ArrowDown") {
          y += 5rem;
      }

      if (event.key === "ArrowRight") {
          x += 5rem;
      }

      if (event.key === "ArrowLeft") {
          x -= 5rem;
      }

      player.style.top = y + "px";
      player.style.left = x + "px";
      });
      
    </script>
  </body>
</html>
