<!DOCTYPE html>
<html>
  <head>
    <title>game</title>

    <style>
      body {
        background-image: url("https://github.com/Jok3rgit/noname-game/blob/d2dac42bb1ad330d6f510e00dd0736c13b2db12e/background.png");
        background-size: 100% auto;
        margin: 0;
        padding: 0
      }
      
      #player {
        background-color: red;
        width: 5rem;
        height: 5rem;
        position: fixed;
        top: 0px;
        left: 0px;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
      
    <script>
      //hitbox check
      function checkCollision(elA, elB) {
        const rA = elA.getBoundingClientRect();
        const rB = elB.getBoundingClientRect();

        return (
          rA.left < rB.right &&
          rA.right > rB.left &&
          rA.top < rB.bottom &&
          rA.bottom > rB.top
        );
      }

      const box1 = document.getElementById("player");
      const box2 = document.getElementById("objects").children;

      setInterval(() => {
        if (checkCollision(box1, box2)) {
          alert("Collision detected");
        }
      });

      //player moves
      const player = document.getElementById("player");

      let x = 0;
      let y = 0;

      window.addEventListener("keydown", (event) => {

      if (event.key === "ArrowUp") {
          y -= 10;
      }

      if (event.key === "ArrowDown") {
          y += 10;
      }

      if (event.key === "ArrowRight") {
          x += 10;
      }

      if (event.key === "ArrowLeft") {
          x -= 10;
      }

      player.style.top = y + "px";
      player.style.left = x + "px";
      });
      
    </script>
  </body>
</html>
