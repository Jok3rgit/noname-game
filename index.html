<!doctype=html>
<html>
  <head>
    <title>game</title>

    <style>
      body {
        overflow: hidden;
        overscroll-behavior: none;
        background-color: skyblue;
      }

      #ground {
        background-color: green;
        position: absolute;
        bottom: 2.5rem;
        left: 0;
        right: 0;
      }
      
      .playerContainer {
        position: fixed;
        bottom: 0;
        top: 0;
        right: 0;
        left: 0;
      }
      
      #player {
        background-color: red;
        width: 5rem;
        height: 5rem;
        position: absolute;
        left: 50%;
        right: 50%;
        top: 50%;
        bottom: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div class="playerContainer">
      <div id="player"></div>
    </div>
    
    <div id="objects">
      <div id="ground"></div>
    </div>
      
    <script>
      //get elements
      const player = document.getElementById("player");
      
      const objectsAll = document.getElementById("objects");
      const objects = objectsAll.children;

      //hitbox check
      function checkCollision(elA, elB) {
        const rA = elA.getBoundingClientRect();
        const rB = elB.getBoundingClientRect();

        return (
          rA.left < rB.right &&
          rA.right > rB.left &&
          rA.top < rB.bottom &&
          rA.bottom > rB.top
        );
      }

      const box1 = document.getElementById("box1");
      const box2 = document.getElementById("box2");

      setInterval(() => {
        if (checkCollision(box1, box2)) {
          alert("Collision detected");
        }
      });

      //player moves
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp") {
          player.style.bottom = "60%";
        }

        if (event.key === "ArrowDown") {
          alert("down");
        }

        if (event.key === "ArrowRight") {
          alert("right");
        }

        if (event.key === "ArrowLeft") {
          alert("left");
        }
      });

      
    </script>
  </body>
</html>
