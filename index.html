<!doctype=html>
<html>
  <head>
    <title>game</title>

    <style>
      body {
        background-image: url("https://cdn.pixabay.com/photo/2023/09/09/10/25/mountains-8242910_1920__77074d93cc.png");
        background-size: 100% auto;
        margin: 0;
        padding: 0
      }
      
      #player {
        background-color: red;
        width: 5rem;
        height: 5rem;
        position: absolute;
        left: 50%;
        right: 50%;
        top: 50%;
        bottom: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
      
    <script>
      //hitbox check
      function checkCollision(elA, elB) {
        const rA = elA.getBoundingClientRect();
        const rB = elB.getBoundingClientRect();

        return (
          rA.left < rB.right &&
          rA.right > rB.left &&
          rA.top < rB.bottom &&
          rA.bottom > rB.top
        );
      }

      const box1 = document.getElementById("player");
      const box2 = document.getElementById("objects").children;

      setInterval(() => {
        if (checkCollision(box1, box2)) {
          alert("Collision detected");
        }
      });

      //player moves
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp") {
          document.getElementById("player").style.bottom = 75 + "%";
        }

        if (event.key === "ArrowDown") {
          document.getElementById("player").style.top = 75 + "%";
        }

        if (event.key === "ArrowRight") {
          document.getElementById("player").style.left = 75 + "%";
        }

        if (event.key === "ArrowLeft") {
          document.getElementById("player").style.right = 75 + "%";
        }
      });

      
    </script>
  </body>
</html>
