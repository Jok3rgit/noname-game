<!DOCTYPE html>
<html>
  <head>
    <title>Comet Miner</title>

    <style>
      body {
        overflow: hidden;
        background-color: rgb(0, 0, 0);
        height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .game-screen {
        background-color: rgb(0, 5, 30);
        background-size: 60rem 40rem;
        height: 40rem;
        width: 60rem;
        position: relative;
      }
      
      #player {
        background-color: red;
        width: 5rem;
        height: 5rem;
        position: absolute;
      }

      #comet {
        background-image: url("https://jok3rgit.github.io/noname-game/images/comet.png");
        background-size: 100% auto;
        height: 5rem;
        width: 5rem;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div class="game-screen">
      <div id="player"></div>

      <div id="objects">
        <div name="comet" id="comet"></div>
      </div>
    </div>
      
    <script>
      //hitbox check
      function checkCollision(elA, elB) {
        const rA = elA.getBoundingClientRect();
        const rB = elB.getBoundingClientRect();

        return (
          rA.left < rB.right &&
          rA.right > rB.left &&
          rA.top < rB.bottom &&
          rA.bottom > rB.top
        );
      }

      const box1 = document.getElementById("player");
      const objects = document.getElementById("objects");

      // Only set up collision checking if objects element exists
      if (objects) {
        const box2 = objects.children;

        setInterval(() => {
          for (let obj of box2) {
            if (checkCollision(box1, obj)) {
              alert(obj.name);
              obj.style.display = "none";
            }
          }
        }, 100);
      }

      //player moves
      const player = document.getElementById("player");

      let x = 0;
      let y = 0;

      window.addEventListener("keydown", (event) => {

      if (event.key === "w") {
          y -= 5;
      }

      if (event.key === "s") {
          y += 5;
      }

      if (event.key === "d") {
          x += 5;
      }

      if (event.key === "a") {
          x -= 5;
      }

      player.style.top = y + "rem";
      player.style.left = x + "rem";
      });
      
    </script>
  </body>
</html>
