<!doctype=html>
<html>
  <head>
    <title>game</title>
    
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        overflow: hidden;
        overscroll-behavior: none;
        background-color: skyblue;
      }

      #ground {
        background-color: green;
        position: absolute;
        bottom: 2.5rem;
        left: 0;
        right: 0;
      }
      
      .playerContainer {
        background-color: yellow;
        position: fixed;
        bottom: 5rem;
        right: 0;
        left: 0;
      }
      
      #player {
        background-color: red;
        width: 5rem;
        height: 5rem;
        position: absolute;
        left: 50%;
        right: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <h1>test1</h1>

    <div class="playerContainer">
      <div id="player"></div>
    </div>
    
    <div id="objects">
      <div id="ground"></div>
    </div>
      
    <script src="script.js"></script>
  </body>
</html>
